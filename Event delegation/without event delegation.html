<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    #parent{
        display: flex;
        flex-direction: column;
        gap: 10px;
        align-items: center;
        width: 400px;
        height: 400px;
        border: 10px solid goldenrod;
    }
    button{
        margin: 10px;
        width: 100px;
        height: 50px;
        background-color: lightblue;
        border-color: burlywood;
        border-width: 2px;
        border-radius: 50%;
    }
</style>
</head>
<body>
    <h1>Example without using event delegation</h1>
    <div id="parent">
        <!-- <button id="btn1" onclick="Notify()">click 1</button>
        <button id="btn2" onclick="Notify()">click 2</button>
        <button id="btn3" onclick="Notify()">click 3</button> -->

        <button id="btn1">click 1</button>
        <button id="btn2">click 2</button>
        <button id="btn3">click 3</button>
    </div>

    <script>

        // function Notify() {
        //     alert("Good morning!");
        // }

        let btn1 = document.getElementById("btn1");
        let btn2 = document.getElementById("btn2"); 
        let btn3 = document.getElementById("btn3");
        btn1.addEventListener("click", function() {
            alert("Good morning!");
        });
        btn2.addEventListener("click", function() {
            alert("Good morning!");
        });
        btn3.addEventListener("click", function() {
            alert("Good morning!");
        });
    </script>
</body>
</html>
