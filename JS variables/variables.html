<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Variables</title>
</head>
<body>


    <script>
        // Declare variables using var, let, and const
        var name = "John";
        let age = 25;
        const country = "USA";
        console.log(name)
        console.log(age)
        console.log(country)

        // String variable
        let city = "New York";
        console.log(city)

        // Number variable
        let salary = 50000;
        console.log(salary)

        // Boolean variable
        let isActive = true;
        console.log(isActive)

   
        
    </script>
</body>
</html>
