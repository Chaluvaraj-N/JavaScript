<!--
setTimeout() accepts 2 parameters

1. callback function: A function that will be executed after the specified time has elapsed.
2. the time in milliseconds: The amount of time to wait before executing the callback function. For example, if you want to execute the callback function after 3 seconds, you would pass 3000 as the second parameter.
 -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        setTimeout(() => {
            alert('Hello, World!');
        }, 3000);
        
    </script>
</body>
</html>
