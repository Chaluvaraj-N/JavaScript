<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>DOM remove() Example</title>
	<style>
		body { font-family: Arial, sans-serif; margin: 24px; }
		h2 { margin-top: 28px; }
		.box { padding: 12px; border: 1px solid #ccc; border-radius: 8px; margin: 10px 0; }
		ul { padding-left: 20px; }
		li { margin: 8px 0; }
		button { margin-left: 8px; cursor: pointer; }
		.row { display: flex; align-items: center; gap: 8px; }
		input { padding: 6px; }
	</style>
</head>
<body>
	<h1>JavaScript DOM <code>remove()</code> Method</h1>

	<!-- Manual remove example -->
	<h2>1) Manual Remove (existing element)</h2>
	<div class="box" id="manualBox">
		This box is already in HTML. Click button to remove it manually.
	</div>
	<button id="manualRemoveBtn">Remove the box</button>

	<!-- Dynamic remove example -->
	<h2>2) Dynamic Remove (created elements)</h2>
	<div class="row">
		<input id="itemInput" type="text" placeholder="Enter item name" />
		<button id="addBtn">Add Item</button>
	</div>
	<ul id="itemList"></ul>

	<script>
		// 1) Manual remove: remove an element that already exists in HTML
		const manualRemoveBtn = document.getElementById('manualRemoveBtn');
		manualRemoveBtn.addEventListener('click', () => {
			const box = document.getElementById('manualBox');
			if (box) box.remove(); // DOM remove()
		});

		// 2) Dynamic remove: create list items and remove each with its own button
		const addBtn = document.getElementById('addBtn');
		const itemInput = document.getElementById('itemInput');
		const itemList = document.getElementById('itemList');

		addBtn.addEventListener('click', () => {
			const text = itemInput.value.trim();
			if (!text) return;

			const li = document.createElement('li');
			li.textContent = text;

			const removeBtn = document.createElement('button');
			removeBtn.textContent = 'Remove';
			removeBtn.addEventListener('click', () => {
				li.remove(); // DOM remove() on dynamic element
			});

			li.appendChild(removeBtn);
			itemList.appendChild(li);
			itemInput.value = '';
			itemInput.focus();
		});
	</script>
</body>
</html>
